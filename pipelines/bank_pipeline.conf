# Bank clients pipeline configuration
input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/logstash-core/lib/jars/postgresql-42.2.18.jar"
    jdbc_driver_class => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://postgres:5432/bankdb"
    jdbc_user => "postgres"
    jdbc_password => "password"
    schedule => "* * * * *"
    statement => "SELECT * FROM bank_clients"
  }
}

filter {
  mutate {
    add_field => { "[@metadata][index]" => "bank-clients" }
  }
}

output {
  elasticsearch {
    hosts => ["https://my-deployment-1cb05e.es.ap-south-1.aws.elastic-cloud.com:443"]
    index => "bank-clients"
    user => "logstash"
    password => "logstash"
  }
  stdout { codec => rubydebug }
}
