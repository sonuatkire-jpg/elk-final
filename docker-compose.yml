version: '3.8'

services:
  logstash:
    build: ./logstash
    volumes:
      - ./logstash:/usr/share/logstash/config
      - ./pipelines:/usr/share/logstash/pipeline
    environment:
      - "XPACK_MANAGEMENT_ENABLED=true"
      - "XPACK_MANAGEMENT_ELASTICSEARCH_HOSTS=https://my-deployment-1cb05e.es.ap-south-1.aws.elastic-cloud.com:443"
      - "XPACK_MANAGEMENT_ELASTICSEARCH_USERNAME=logstash"
      - "XPACK_MANAGEMENT_ELASTICSEARCH_PASSWORD=logstash"
      - "XPACK_MANAGEMENT_LOGSTASH_POLL_INTERVAL=5s"
      - "XPACK_MANAGEMENT_PIPELINE_ID=bank_pipeline"
      - "XPACK_MONITORING_ELASTICSEARCH_HOSTS=https://my-deployment-1cb05e.es.ap-south-1.aws.elastic-cloud.com:443"
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      - elk

  elastic-agent:
    image: docker.elastic.co/elastic-agent/elastic-agent:9.3.3
    user: root
    environment:
      - "FLEET_ENROLL=1"
      - "FLEET_URL=https://1cb05e3645c445fbb2d4524592d4071b.fleet.ap-south-1.aws.elastic-cloud.com:443"
      - "FLEET_ENROLLMENT_TOKEN=NkctR3Y1MEJnbVl2NHhGYVU0T3E6dTd3SGZWOWlTZFh1UVZ3MUdRanpyQQ=="
      - "FLEET_INSECURE=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
    networks:
      - elk

  postgres:
    build: ./postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bankdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    networks:
      - elk

networks:
  elk:
    driver: bridge
